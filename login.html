<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Connexion administrateur — SporFormation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="/src/js/admin/login.js"></script>
  <style>
    :root { --bg: #1A1A2E; --accent: #F94144; --text: #FFFFFF; --soft: rgba(255,255,255,0.08); --muted: rgba(255,255,255,0.6); }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: "Inter", system-ui, sans-serif; }
    .login-shell { min-height: 100vh; display: grid; place-items: center; padding: 24px; background:
      radial-gradient(circle at 20% 20%, rgba(249,65,68,0.15), transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255,255,255,0.06), transparent 50%),
      var(--bg);
    }
    .login-card { width: 100%; max-width: 420px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 36px; backdrop-filter: blur(6px); box-shadow: 0 20px 60px rgba(0,0,0,0.45); }
    .login-card h1 { font-family: "Poppins", sans-serif; font-size: 24px; margin: 0 0 6px; letter-spacing: -0.01em; }
    .login-card p.subtitle { margin: 0 0 28px; color: var(--muted); font-size: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: rgba(255,255,255,0.8); }
    input[type="email"] { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.25); color: var(--text); font-size: 15px; font-family: inherit; transition: border-color 0.15s, box-shadow 0.15s; }
    .login-password-wrap { position: relative; display: block; }
    .login-password-wrap input {
      width: 100%; padding: 12px 44px 12px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.25); color: var(--text); font-size: 15px; font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .login-password-wrap input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,65,68,0.25); }
    .login-password-toggle {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: 36px; height: 36px; padding: 0; border: none; border-radius: 8px;
      background: transparent; color: rgba(255,255,255,0.5); cursor: pointer;
      display: grid; place-items: center; transition: color 0.15s, background 0.15s;
    }
    .login-password-toggle:hover { color: rgba(255,255,255,0.92); background: rgba(255,255,255,0.06); }
    .login-password-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .login-password-toggle svg { display: block; }
    .login-password-toggle__hide { display: none; }
    .login-password-toggle.is-revealed .login-password-toggle__show { display: none; }
    .login-password-toggle.is-revealed .login-password-toggle__hide { display: block; }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,65,68,0.25); }
    .field { margin-bottom: 18px; }
    button[type="submit"] { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: 0; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; transition: transform 0.05s, filter 0.15s; }
    button[type="submit"]:hover:not(:disabled) { filter: brightness(1.1); }
    button[type="submit"]:active:not(:disabled) { transform: translateY(1px); }
    button[type="submit"]:disabled { opacity: 0.6; cursor: progress; }
    .error { margin-top: 16px; padding: 10px 12px; background: rgba(249,65,68,0.15); border: 1px solid rgba(249,65,68,0.35); border-radius: 8px; font-size: 13px; color: #ffd9d9; display: none; word-break: break-word; line-height: 1.5; }
    .error.visible { display: block; }
    .error code { font-family: ui-monospace, monospace; font-size: 11.5px; background: rgba(0,0,0,0.35); padding: 8px 10px; border-radius: 6px; display: block; margin-top: 8px; white-space: pre-wrap; word-break: break-all; }
    .return-link { display: block; margin-top: 22px; font-size: 13px; color: var(--muted); text-decoration: none; text-align: center; }
    .return-link:hover { color: var(--text); }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .brand-dot { width: 36px; height: 36px; border-radius: 10px; background: var(--accent); display: grid; place-items: center; font-weight: 800; }
    .brand-text { font-family: "Poppins", sans-serif; font-size: 14px; letter-spacing: 0.04em; text-transform: uppercase; }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="login-card" aria-labelledby="login-title">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true">S</span>
        <span class="brand-text">SporFormation · admin</span>
      </div>
      <h1 id="login-title">Connexion administrateur</h1>
      <p class="subtitle">Accédez à la console de gestion du site.</p>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Adresse e-mail</label>
          <input id="login-email" name="email" type="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="login-password">Mot de passe</label>
          <div class="login-password-wrap">
            <input id="login-password" name="password" type="password" autocomplete="current-password" required>
            <button type="button" class="login-password-toggle" id="login-password-toggle" aria-label="Afficher le mot de passe" aria-pressed="false">
              <svg class="login-password-toggle__show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="login-password-toggle__hide" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" id="login-submit">Se connecter</button>
        <p class="error" id="login-error" role="alert"></p>
      </form>

      <a class="return-link" href="/">← Retour au site</a>
    </section>
  </main>
</body>
</html>
